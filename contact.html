<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get in touch</title>
  <link rel="stylesheet" href="output.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  
  <style>
    /* Agrandissement global du contenu à partir de 700px */
    @media (min-width: 700px) {
      html {
        font-size: 1.2rem; /* Augmente la taille de base (échelle relative) */
      }
      .max-w-xl {
        max-width: 45rem; /* Elargit le conteneur pour suivre l'agrandissement du texte */
      }
    }
  </style>
</head>
<body class="bg-[#f9f6f1] font-['DM_Sans']">

  <section class="min-h-screen flex items-center justify-center px-4 py-10">
   
    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-xl">
        <a href="index.html" class="text-[#991b1b] text-lg sm:text-xl hover:text-[#b91c1c]">← Go back</a>

      <h2 class="text-3xl sm:text-4xl mb-2 text-[#1a1a1a] font-['Playfair_Display']">
        Get in touch
      </h2>

      <p class="text-[#78716c] mb-6 text-sm sm:text-base">
        I will reply as soon as possible
      </p>

      <form id="contactForm" class="space-y-4">

        <div class="flex flex-col sm:flex-row gap-4">
          <input type="text" placeholder="First name *"
            class="w-full sm:w-1/2 border border-[#e5e0d8] rounded-lg p-3 focus:outline-none focus:border-[#991b1b]">

          <input type="text" placeholder="Last name *"
            class="w-full sm:w-1/2 border border-[#e5e0d8] rounded-lg p-3 focus:outline-none focus:border-[#991b1b]">
        </div>

        <input type="number" placeholder="Number (or email)"
          class="w-full border border-[#e5e0d8] rounded-lg p-3 focus:outline-none focus:border-[#991b1b]">

        <input type="email" placeholder="Email (or number)"
          class="w-full border border-[#e5e0d8] rounded-lg p-3 focus:outline-none focus:border-[#991b1b]">

        <textarea rows="4" placeholder="Your message *"
          class="w-full border border-[#e5e0d8] rounded-lg p-3 focus:outline-none focus:border-[#991b1b]"></textarea>

        <button type="submit"
          class="w-full bg-[#991b1b] text-white py-3 rounded-lg hover:bg-[#7f1d1d] transition">
          Send
        </button>

      </form>

      <p id="confirmationMessage"
         class="hidden mt-4 text-center font-medium text-sm sm:text-base">
      </p>

    </div>
  </section>

  <script src="contact.js"></script>

</body>
</html>
